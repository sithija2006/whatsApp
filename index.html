<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatFlow - Modern Firebase Chat</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading" class="loading-screen">
        <div class="loading-container">
            <div class="loading-logo">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
            </div>
            <div class="loading-spinner"></div>
            <p>Connecting to ChatFlow...</p>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="loginScreen" class="screen hidden">
        <div class="login-background">
            <div class="login-container">
                <div class="login-header">
                    <div class="logo">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                    </div>
                    <h1 id="loginTitle">Welcome to ChatFlow</h1>
                    <p id="loginSubtitle">Connect with friends instantly</p>
                </div>

                <form id="authForm" class="auth-form">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                            <input type="email" id="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <circle cx="12" cy="16" r="1"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <input type="password" id="password" placeholder="Enter your password" required minlength="6" autocomplete="current-password">
                        </div>
                    </div>

                    <div id="errorMessage" class="error-message hidden">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="15" y1="9" x2="9" y2="15"/>
                            <line x1="9" y1="9" x2="15" y2="15"/>
                        </svg>
                        <span id="errorText"></span>
                    </div>

                    <button type="submit" id="authButton" class="auth-button">
                        <span id="authButtonText">Sign In</span>
                        <div id="authButtonSpinner" class="button-spinner hidden"></div>
                    </button>
                </form>

                <div class="auth-switch">
                    <button id="switchAuth" class="switch-button">
                        Don't have an account? <span>Sign up</span>
                    </button>
                </div>

                <div class="login-footer">
                    <p>Secure • Fast • Reliable</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Dashboard -->
    <div id="chatScreen" class="screen hidden">
        <div class="chat-container">
            <!-- Mobile Header -->
            <div class="mobile-header">
                <button id="mobileMenuButton" class="mobile-menu-button">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <div class="mobile-header-title">
                    <h1>ChatFlow</h1>
                </div>
                <button id="mobileLogoutButton" class="mobile-logout-button">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16,17 21,12 16,7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>

            <!-- Sidebar -->
            <div id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <div class="user-info">
                        <div class="user-avatar">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                        <div class="user-details">
                            <h3>You</h3>
                            <p id="currentUserEmail"></p>
                        </div>
                    </div>
                    <button id="logoutButton" class="logout-button" title="Logout">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16,17 21,12 16,7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>

                <div class="users-header">
                    <div class="users-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        <span>Contacts</span>
                        <span id="userCount" class="user-count">0</span>
                    </div>
                </div>

                <div id="usersList" class="users-list">
                    <div class="users-loading">
                        <div class="loading-spinner small"></div>
                        <p>Loading contacts...</p>
                    </div>
                </div>
            </div>

            <!-- Chat Area -->
            <div id="chatArea" class="chat-area">
                <div id="welcomeMessage" class="welcome-message">
                    <div class="welcome-content">
                        <div class="welcome-icon">
                            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                            </svg>
                        </div>
                        <h3>Start a Conversation</h3>
                        <p>Select a contact from the sidebar to begin chatting</p>
                        <div class="welcome-features">
                            <div class="feature">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
                                </svg>
                                <span>Real-time messaging</span>
                            </div>
                            <div class="feature">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                                </svg>
                                <span>Secure & private</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="chatWindow" class="chat-window hidden">
                    <div class="chat-header">
                        <button id="backButton" class="back-button">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15,18 9,12 15,6"/>
                            </svg>
                        </button>
                        <div class="chat-user-info">
                            <div class="chat-user-avatar">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </div>
                            <div class="chat-user-details">
                                <h3 id="chatUserName"></h3>
                                <p id="chatUserStatus"></p>
                            </div>
                        </div>
                        <div class="chat-actions">
                            <button class="chat-action-button" title="More options">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="1"/>
                                    <circle cx="19" cy="12" r="1"/>
                                    <circle cx="5" cy="12" r="1"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div id="messagesContainer" class="messages-container">
                        <div id="messagesLoading" class="messages-loading">
                            <div class="loading-spinner small"></div>
                            <p>Loading messages...</p>
                        </div>
                        <div id="messagesList" class="messages-list"></div>
                    </div>

                    <form id="messageForm" class="message-form">
                        <div class="message-input-container">
                            <input type="text" id="messageInput" placeholder="Type your message..." required>
                            <button type="submit" id="sendButton" class="send-button">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"/>
                                    <polygon points="22,2 15,22 11,13 2,9 22,2"/>
                                </svg>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile overlay -->
    <div id="mobileOverlay" class="mobile-overlay hidden"></div>

    <script type="module" src="app.js"></script>
</body>
</html>
